name: HL7 FHIR Validation

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  fhir-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: FHIR mapping checks
        run: npm run fhir:check-mapping

      - name: FHIR conformance checks
        run: npm run fhir:check-conformance

      - name: FHIR structural and functional validation
        run: npm run fhir:check-validation
